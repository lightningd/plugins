version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"

    groups:
      all-dependencies:
        patterns:
          - "*"

    cooldown:
      default-days: 7

    open-pull-requests-limit: 1

    versioning-strategy: "auto"

    labels:
      - "dependencies"
      - "python"

    allow:
      - dependency-type: "all"
